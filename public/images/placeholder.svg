<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Glamo placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A0E24"/>
      <stop offset="1" stop-color="#76153C"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="25%" r="65%">
      <stop offset="0" stop-color="rgba(255,255,255,.35)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="280" cy="200" r="260" fill="url(#glow)" filter="url(#soft)"/>
  <circle cx="980" cy="620" r="320" fill="url(#glow)" filter="url(#soft)"/>

  <g opacity=".18">
    <circle cx="180" cy="640" r="7" fill="#fff"/>
    <circle cx="240" cy="600" r="4" fill="#fff"/>
    <circle cx="310" cy="665" r="5" fill="#fff"/>
    <circle cx="980" cy="180" r="6" fill="#fff"/>
    <circle cx="1040" cy="220" r="4" fill="#fff"/>
    <circle cx="930" cy="245" r="5" fill="#fff"/>
  </g>

  <g fill="#fff">
    <text x="600" y="430" text-anchor="middle" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="84" font-weight="800" opacity=".92">Glamo</text>
    <text x="600" y="495" text-anchor="middle" font-family="Poppins, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" opacity=".78">Urembo Ukiwa Nyumbani</text>
  </g>
</svg>

